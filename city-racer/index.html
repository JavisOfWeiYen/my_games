<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>City Racer 城市賽車</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body { font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #06070d; color: #e7e8ee; }
  #game { position: fixed; inset: 0; }
  #view { display: block; width: 100%; height: 100%; }

  #bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 5; }
  #bar button {
    border: 1px solid rgba(255,255,255,.1); border-radius: 11px; padding: 8px 13px;
    font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: .03em; color: #e7e8ee;
    background: rgba(20,22,32,.7); backdrop-filter: blur(3px); cursor: pointer;
  }
  #bar button:active { transform: scale(.95); }

  #pad { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  #pad .grp { position: absolute; bottom: 18px; display: flex; gap: 14px; }
  #pad .left { left: 18px; } #pad .right { right: 18px; }
  #pad button {
    pointer-events: auto; width: 72px; height: 72px; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.12); font-size: 24px; color: #e7e8ee; cursor: pointer;
    background: rgba(20,22,32,.5); display: flex; align-items: center; justify-content: center; touch-action: none;
  }
  #pad button:active { transform: scale(.94); background: rgba(40,44,60,.7); }
  #pad .gas   { background: rgba(52,211,153,.32); border-color: rgba(52,211,153,.5); }
  #pad .brake { background: rgba(251,113,133,.32); border-color: rgba(251,113,133,.5); }

  #overlay {
    position: absolute; inset: 0; z-index: 9; background: rgba(6,7,13,.84); backdrop-filter: blur(4px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px; padding: 24px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { margin: 0; font-size: 30px; font-weight: 700; letter-spacing: .28em; text-transform: uppercase;
    background: linear-gradient(90deg,#34d3ff,#a78bfa,#ff5db4); -webkit-background-clip: text; background-clip: text; color: transparent; }
  #overlay p { margin: 0; font-size: 14px; line-height: 1.7; color: #9a9db0; max-width: 440px; }
  #overlay .keys { font-size: 12px; color: #6b6e7e; }
  #overlay .big { font-size: 42px; font-weight: 800; color: #f2f3f7; }
  #overlay button {
    border: none; border-radius: 12px; padding: 13px 30px; font-family: inherit; font-size: 16px; font-weight: 700;
    letter-spacing: .05em; color: #06070d; background: linear-gradient(90deg,#34d3ff,#7aa2ff); cursor: pointer;
  }
  #overlay button:active { transform: scale(.96); }
</style>
</head>
<body>
<div id="game">
  <canvas id="view"></canvas>

  <div id="bar">
    <button id="bRestart">↺ Restart 重新</button>
    <button id="bPause">⏸ Pause</button>
  </div>

  <div id="pad">
    <div class="grp left">
      <button id="bLeft">◀</button>
      <button id="bRight">▶</button>
    </div>
    <div class="grp right">
      <button class="brake" id="bBrake">▼</button>
      <button class="gas"   id="bGas">▲</button>
    </div>
  </div>

  <div id="overlay">
    <h1>City Racer</h1>
    <p>You're in the driver's seat on a neon highway. Reach the finish line before time runs out to clear the level — each one is faster and busier! 坐進駕駛座飆過霓虹公路：在時間內衝過終點線就晉級，每一關都更快、車更多！</p>
    <p class="keys">⌨️ W/↑ accelerate · S/↓ brake · A/D ←/→ steer · P pause · R restart<br>📱 use the on-screen buttons</p>
    <button id="ovBtn">▶ Start 開始</button>
  </div>
</div>

<script>
// ============================================================
//  City Racer — a pseudo-3D racing game, seen from INSIDE the
//  car (cockpit view): you see the dashboard, the speed + rev
//  gauges, half the steering wheel, and the traffic ahead.
//  The road is a list of "segments" projected from 3D to 2D
//  and drawn far-to-near. Tune the feel in the CONFIG block.
//
//  CONTENTS — jump between parts by searching the "====" banners:
//    1. CONFIG       tunable feel + neon colours
//    2. STATE        game variables + input flags
//    3. HELPERS      small math / drawing utilities
//    4. TRACK        build the road, hills, curves + buildings
//    5. TRAFFIC      spawn and move rival cars
//    6. PROJECTION   3D world point -> 2D screen point
//    7. UPDATE       steering, speed, off-road, timer, levels
//    8. RENDER       background, road, buildings, traffic
//    9. COCKPIT      dashboard, speed/rev gauges, steering wheel
//   10. HUD          level / time / level-up banner
//   11. LOOP+SIZE    main loop and canvas sizing
//   12. CONTROLS     start/pause, keyboard, touch buttons
// ============================================================

const $ = s => document.querySelector(s);
const view = $('#view'), ctx = view.getContext('2d');

// ===== 1. CONFIG =====
const SEG = 200, RUMBLE = 5, ROAD_W = 2000, LANES = 3;
const DRAW = 240, FOV = 98, CAM_H = 720;   // low, in-car eye level (you see cars' full rear)
const HZN = 0.50;                          // horizon position (fraction of height)
const CENTRIFUGAL = 0.32;
const CAR_W = ROAD_W * 0.52;
const cameraDepth = 1 / Math.tan((FOV / 2) * Math.PI / 180);
const MAXSPEED = SEG * 64;       // top speed (shows as 200 km/h on the dial)
const ACCEL = MAXSPEED / 5, BRAKE = -MAXSPEED, DECEL = -MAXSPEED / 5;
const OFF_DECEL = -MAXSPEED / 1.6, OFF_LIMIT = MAXSPEED / 3.2;
const playerZ = CAM_H * cameraDepth;

// ---------------- colours (night neon) ----------------
const LIGHT  = { road:'#3b3e49', grass:'#0e1320', rumble:'#c7ccd8', edge:'#eef2fb', lane:'#eef2fb' };
const DARK   = { road:'#35383f', grass:'#0b0f19', rumble:'#8d929e', edge:'#eef2fb', lane:null };
const START  = { road:'#e7e8ee', grass:'#0e1320', rumble:'#e7e8ee', edge:'#e7e8ee', lane:null };
const FINISH = { road:'#1a1c24', grass:'#0e1320', rumble:'#1a1c24', edge:'#1a1c24', lane:null };
const CAR_COLORS = ['#34d3ff','#ff5db4','#fbbf24','#a78bfa','#34d399','#fb7185','#7aa2ff','#f97316'];

// ===== 2. STATE =====
let segments = [], cars = [], trackLength = 0;
let position = 0, speed = 0, playerX = 0, steerAngle = 0;
let level = 1, timeLeft = 0, bestLevel = 0, banner = '', bannerUntil = 0;
let perf = 0, lastT = 0, started = 0;
let running = false, paused = false, cityOffset = 0;
let W = 0, H = 0, dpr = 1, horizonY = 0;
const input = { gas: 0, brake: 0, left: 0, right: 0 };
bestLevel = +(localStorage.getItem('cityracer3d-level') || 0);
function timeLimit(lv) { return Math.max(45, 90 - (lv - 1) * 5); }   // seconds to finish a level (generous)

// ===== 3. HELPERS =====
function lastY() { return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y; }
function easeIn(a, b, p)    { return a + (b - a) * p * p; }
function easeInOut(a, b, p) { return a + (b - a) * (-Math.cos(p * Math.PI) / 2 + 0.5); }
function increase(s, inc, max) { let r = s + inc; while (r >= max) r -= max; while (r < 0) r += max; return r; }
function findSegment(z) { return segments[Math.floor(z / SEG) % segments.length]; }
function overlap(x1, w1, x2, w2, pct) { const h = (pct || 1) / 2; return !((x1 + w1 * h < x2 - w2 * h) || (x1 - w1 * h > x2 + w2 * h)); }
function darken(hex, f) { const n = parseInt(hex.slice(1), 16); return 'rgb(' + Math.round((n >> 16 & 255) * f) + ',' + Math.round((n >> 8 & 255) * f) + ',' + Math.round((n & 255) * f) + ')'; }
function rrect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

// ===== 4. TRACK =====
function addSegment(curve, y) {
  const n = segments.length;
  segments.push({
    index: n,
    p1: { world: { y: lastY(), z: n * SEG },      camera: {}, screen: {} },
    p2: { world: { y: y,       z: (n + 1) * SEG }, camera: {}, screen: {} },
    curve, cars: [], clip: 0,
    color: Math.floor(n / RUMBLE) % 2 ? DARK : LIGHT,
  });
}
function addRoad(enter, hold, leave, curve, y) {
  const startY = lastY(), endY = startY + y * SEG, total = enter + hold + leave;
  let n = 0;
  for (; n < enter; n++) addSegment(easeIn(0, curve, n / enter), easeInOut(startY, endY, n / total));
  for (let h = 0; h < hold; h++, n++) addSegment(curve, easeInOut(startY, endY, n / total));
  for (let l = 0; l < leave; l++, n++) addSegment(easeInOut(curve, 0, l / leave), easeInOut(startY, endY, n / total));
}
const LEN = { S: 25, M: 50, L: 100 }, CRV = { E: 2, M: 4, H: 5 }, HILL = { L: 8, M: 18, H: 30 };
function straight(n) { addRoad(n, n, n, 0, 0); }
function curve(n, c, h) { addRoad(n, n, n, c, h || 0); }
function hill(n, h) { addRoad(n, n, n, 0, h); }
function sCurves() {
  addRoad(LEN.M, LEN.M, LEN.M, -CRV.E, HILL.L); addRoad(LEN.M, LEN.M, LEN.M, CRV.M, HILL.M);
  addRoad(LEN.M, LEN.M, LEN.M, CRV.E, -HILL.L); addRoad(LEN.M, LEN.M, LEN.M, -CRV.M, HILL.M);
  addRoad(LEN.M, LEN.M, LEN.M, -CRV.E, -HILL.M);
}
const BCOL = ['#141a2e', '#16122a', '#101a24', '#1a1430', '#121726'];
const BNEON = ['#34d3ff', '#ff5db4', '#ffd27a', '#a78bfa', '#34d399'];
function makeBuilding() {
  return {
    off: ROAD_W * (1.7 + Math.random() * 1.3),     // lateral distance from road centre
    w:   ROAD_W * (0.9 + Math.random() * 1.0),
    h:   2200 + Math.random() * 5200,
    color: BCOL[Math.floor(Math.random() * BCOL.length)],
    neon:  BNEON[Math.floor(Math.random() * BNEON.length)],
    seed:  Math.floor(Math.random() * 1000),
  };
}
function buildTrack() {
  segments = [];
  straight(LEN.S); curve(LEN.M, CRV.M, HILL.L); curve(LEN.M, -CRV.H, HILL.M); hill(LEN.M, HILL.H);
  sCurves(); straight(LEN.M); curve(LEN.M, -CRV.M, -HILL.M); straight(LEN.S);
  for (let i = 0; i < RUMBLE; i++) segments[i].color = START;
  for (let i = 1; i <= RUMBLE; i++) segments[segments.length - i].color = FINISH;
  // line the road with city buildings
  for (const s of segments) {
    if (s.index % 4 === 0) {
      if (Math.random() < 0.78) s.bL = makeBuilding();
      if (Math.random() < 0.78) s.bR = makeBuilding();
    }
  }
  trackLength = segments.length * SEG;
}

// ===== 5. TRAFFIC =====
function resetCars() {
  cars = []; segments.forEach(s => s.cars = []);
  const TOTAL = Math.min(64, 22 + level * 5);                 // more traffic each level
  const base = MAXSPEED * (0.20 + Math.min(0.22, level * 0.02)); // and a bit faster
  for (let i = 0; i < TOTAL; i++) {
    const big = Math.random() < 0.18;                          // some trucks/SUVs
    const car = {
      offset: Math.random() * 1.6 - 0.8,
      z: Math.floor(Math.random() * segments.length) * SEG,
      speed: base + Math.random() * MAXSPEED * 0.18,
      color: CAR_COLORS[i % CAR_COLORS.length],
      wMul: big ? 1.25 : 0.92 + Math.random() * 0.18,
      hMul: big ? 1.35 : 1.0,
      big,
    };
    findSegment(car.z).cars.push(car); cars.push(car);
  }
}
function updateCars(dt) {
  for (const car of cars) {
    const a = findSegment(car.z); car.z = increase(car.z, dt * car.speed, trackLength);
    const b = findSegment(car.z);
    if (a !== b) { const i = a.cars.indexOf(car); if (i >= 0) a.cars.splice(i, 1); b.cars.push(car); }
  }
}

// ===== 6. PROJECTION =====
function project(p, camX, camY, camZ) {
  p.camera.x = (p.world.x || 0) - camX;
  p.camera.y = (p.world.y || 0) - camY;
  p.camera.z = (p.world.z || 0) - camZ;
  p.screen.scale = cameraDepth / p.camera.z;
  p.screen.x = Math.round(W / 2 + p.screen.scale * p.camera.x * W / 2);
  p.screen.y = Math.round(horizonY - p.screen.scale * p.camera.y * H / 2);
  p.screen.w = Math.round(p.screen.scale * ROAD_W * W / 2);
}

// ===== 7. UPDATE =====
function update(dt) {
  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; gameOver(); return; }
  updateCars(dt);
  const playerSeg = findSegment(position + playerZ);
  const speedPct = speed / MAXSPEED;

  const dx = dt * 2.4 * speedPct;
  if (input.left)  playerX -= dx;
  if (input.right) playerX += dx;
  playerX -= dx * speedPct * playerSeg.curve * CENTRIFUGAL;

  if (input.gas)        speed += ACCEL * dt;
  else if (input.brake) speed += BRAKE * dt;
  else                  speed += DECEL * dt;
  if ((playerX < -1 || playerX > 1) && speed > OFF_LIMIT) speed += OFF_DECEL * dt;

  // hit the roadside buildings/barrier -> bounce back in and brake hard
  const WALL = 1.9;
  if (playerX < -WALL) { playerX = -WALL + 0.18; speed *= 0.4; }
  else if (playerX > WALL) { playerX = WALL - 0.18; speed *= 0.4; }

  playerX = Math.max(-2.4, Math.min(2.4, playerX));
  speed = Math.max(0, Math.min(speed, MAXSPEED));

  if (speed > 0) for (const car of playerSeg.cars) {
    if (speed > car.speed && overlap(playerX, CAR_W / ROAD_W, car.offset, CAR_W / ROAD_W, 0.85)) {
      speed = car.speed * (car.speed / speed);
      position = increase(car.z, -playerZ * 2, trackLength); break;  // stop well behind so its whole rear shows
    }
  }

  const old = position;
  position = increase(position, dt * speed, trackLength);
  if (position < old) levelUp();        // crossed the finish line within the time limit
  cityOffset = increase(cityOffset, playerSeg.curve * speedPct * dt * 1.4, 1);

  // steering wheel eases toward the turn + the road's curve
  const target = ((input.right ? 1 : 0) - (input.left ? 1 : 0)) * 0.6 + playerSeg.curve * 0.05;
  steerAngle += (target - steerAngle) * Math.min(1, dt * 7);
}

// ===== 8. RENDER =====
function render() {
  horizonY = Math.round(H * HZN);
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  const baseSeg = findSegment(position);
  const basePct = (position % SEG) / SEG;
  const playerSeg = findSegment(position + playerZ);
  const playerY = playerSeg.p1.world.y + (playerSeg.p2.world.y - playerSeg.p1.world.y) * (((position + playerZ) % SEG) / SEG);

  let x = 0, dx = -(baseSeg.curve * basePct), maxy = H;
  for (let n = 0; n < DRAW; n++) {
    const seg = segments[(baseSeg.index + n) % segments.length];
    const looped = seg.index < baseSeg.index;
    const camZ = position - (looped ? trackLength : 0);
    project(seg.p1, playerX * ROAD_W - x,      playerY + CAM_H, camZ);
    project(seg.p2, playerX * ROAD_W - x - dx, playerY + CAM_H, camZ);
    x += dx; dx += seg.curve; seg.clip = maxy;
    if (seg.p1.camera.z <= cameraDepth || seg.p2.screen.y >= seg.p1.screen.y || seg.p2.screen.y >= maxy) continue;
    renderSegment(seg.p1.screen, seg.p2.screen, seg.color);
    maxy = seg.p2.screen.y;
  }

  // buildings, roadside reflectors and traffic — far to near
  for (let n = DRAW - 1; n > 0; n--) {
    const seg = segments[(baseSeg.index + n) % segments.length];
    const s = seg.p1.screen;
    if (seg.bL) drawBuilding(s, -1, seg.bL);
    if (seg.bR) drawBuilding(s, 1, seg.bR);
    if (s.scale && seg.index % 4 === 0) {
      const r = Math.max(1, s.scale * 2400);
      if (r < 20) {
        const ex = s.scale * ROAD_W * 1.05 * W / 2;
        glowDot(s.x - ex, s.y, r, '#dfe6f5');   // white cat's-eye on the left
        glowDot(s.x + ex, s.y, r, '#ffce7a');   // amber on the right
      }
    }
    for (const car of seg.cars) drawTraffic(s, car, seg.clip);
  }

  drawCockpit();
  drawInfo();
}

function glowDot(x, y, r, col) {
  ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = r * 2.2;
  ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.restore();
}

function drawBackground() {
  const hz = horizonY;
  let g = ctx.createLinearGradient(0, 0, 0, hz);
  g.addColorStop(0, '#05060f'); g.addColorStop(.55, '#141833'); g.addColorStop(1, '#3a2552');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, hz + 2);
  // stars
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  for (let i = 0; i < 70; i++) ctx.fillRect((i * 137.5) % W, (i * 53.3) % (hz * 0.78), 1.5, 1.5);
  // moon with soft glow
  ctx.save(); ctx.shadowColor = 'rgba(180,200,255,.6)'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#dce8ff'; ctx.beginPath(); ctx.arc(W * 0.82, hz * 0.4, 30, 0, 7); ctx.fill(); ctx.restore();
  ctx.fillStyle = '#141833'; ctx.beginPath(); ctx.arc(W * 0.8, hz * 0.36, 26, 0, 7); ctx.fill();
  // skyline (parallax), two layers for depth
  const shift = cityOffset * 720;
  drawSkyline(hz, shift * 0.5, hz * 0.5, '#0a0e22', 64, 0);
  drawSkyline(hz, shift, hz * 0.62, '#0c1228', 46, 1);
  // horizon haze line
  let h2 = ctx.createLinearGradient(0, hz - 24, 0, hz + 4);
  h2.addColorStop(0, 'rgba(120,90,170,0)'); h2.addColorStop(1, 'rgba(150,110,200,.35)');
  ctx.fillStyle = h2; ctx.fillRect(0, hz - 24, W, 28);
}
function drawSkyline(hz, shift, maxH, color, step, lit) {
  for (let bx = -step + ((-shift % step) + step) % step; bx < W; bx += step) {
    const seed = Math.floor((bx + shift) / step);
    const bh = 24 + Math.abs(Math.sin(seed * 2.3)) * maxH;
    const bw = step - 10 - (seed % 3) * 4;
    ctx.fillStyle = color; ctx.fillRect(bx, hz - bh, bw, bh);
    if (lit) {
      ctx.fillStyle = (seed % 4 === 0) ? 'rgba(52,211,255,.5)' : 'rgba(255,221,120,.38)';
      for (let wy = hz - bh + 6; wy < hz - 4; wy += 9)
        for (let wx = bx + 4; wx < bx + bw - 4; wx += 7)
          if ((seed + wx + wy) % 3 === 0) ctx.fillRect(wx, wy, 2.5, 3.5);
    }
  }
}

function poly(x1, y1, x2, y2, x3, y3, x4, y4, color) {
  ctx.fillStyle = color; ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.lineTo(x4, y4); ctx.closePath(); ctx.fill();
}
function renderSegment(p1, p2, c) {
  const r1 = p1.w / 5, r2 = p2.w / 5;     // rumble width
  const e1 = p1.w / 22, e2 = p2.w / 22;   // edge line width
  ctx.fillStyle = c.grass; ctx.fillRect(0, p2.y, W, p1.y - p2.y);
  // rumble strips
  poly(p1.x - p1.w - r1, p1.y, p1.x - p1.w, p1.y, p2.x - p2.w, p2.y, p2.x - p2.w - r2, p2.y, c.rumble);
  poly(p1.x + p1.w + r1, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x + p2.w + r2, p2.y, c.rumble);
  // road
  poly(p1.x - p1.w, p1.y, p1.x + p1.w, p1.y, p2.x + p2.w, p2.y, p2.x - p2.w, p2.y, c.road);
  // solid edge lines just inside the road
  poly(p1.x - p1.w + e1 * 2, p1.y, p1.x - p1.w + e1 * 3, p1.y, p2.x - p2.w + e2 * 3, p2.y, p2.x - p2.w + e2 * 2, p2.y, c.edge);
  poly(p1.x + p1.w - e1 * 3, p1.y, p1.x + p1.w - e1 * 2, p1.y, p2.x + p2.w - e2 * 2, p2.y, p2.x + p2.w - e2 * 3, p2.y, c.edge);
  // dashed lane separators (only on light segments -> stripes)
  if (c.lane) {
    const lw1 = p1.w / 30, lw2 = p2.w / 30;
    for (let i = 1; i < LANES; i++) {
      const lx1 = p1.x - p1.w + (2 * p1.w / LANES) * i, lx2 = p2.x - p2.w + (2 * p2.w / LANES) * i;
      poly(lx1 - lw1, p1.y, lx1 + lw1, p1.y, lx2 + lw2, p2.y, lx2 - lw2, p2.y, c.lane);
    }
  }
}

// a neon roadside building, projected from its segment
function drawBuilding(s, side, b) {
  if (!s.scale) return;
  const wpx = s.scale * b.w * W / 2;
  const hpx = s.scale * b.h * H / 2;
  if (wpx < 2 || hpx < 3) return;
  const cxp = s.x + side * s.scale * b.off * W / 2;
  const bx = cxp - wpx / 2, byTop = s.y - hpx;
  if (byTop > s.clip || bx > W || bx + wpx < 0) return;
  // facade with a side-lit gradient
  const g = ctx.createLinearGradient(bx, 0, bx + wpx, 0);
  g.addColorStop(0, b.color); g.addColorStop(1, darken(b.color, .65));
  ctx.fillStyle = g; ctx.fillRect(bx, byTop, wpx, hpx);
  // glowing roofline
  ctx.fillStyle = b.neon; ctx.fillRect(bx, byTop, wpx, Math.max(1, hpx * 0.018));
  // lit windows (kept cheap)
  if (wpx > 10 && hpx > 16) {
    const cols = Math.min(6, Math.max(2, Math.floor(wpx / 9)));
    const rows = Math.min(16, Math.max(2, Math.floor(hpx / 12)));
    const gw = wpx / cols, gh = hpx / rows;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      if ((b.seed + r * 3 + c * 7) % 3 === 0) {
        ctx.fillStyle = ((b.seed + r + c) % 6 === 0) ? b.neon : 'rgba(255,221,150,.5)';
        ctx.fillRect(bx + c * gw + gw * 0.22, byTop + r * gh + gh * 0.2, gw * 0.5, gh * 0.5);
      }
  }
}

// detailed rear-view traffic car
function drawTraffic(segScreen, car, clipY) {
  if (!segScreen.scale) return;
  const scale = segScreen.scale;
  const w = scale * CAR_W * W / 2 * 0.92 * car.wMul;
  const h = w * 0.62 * car.hMul;
  const x = segScreen.x + scale * car.offset * ROAD_W * W / 2 - w / 2;
  const y = segScreen.y - h;
  if (w < 5 || y > clipY) return;
  const big = w > 18;
  const dk = darken(car.color, .52), dk2 = darken(car.color, .30);

  // ground shadow / ambient occlusion
  ctx.fillStyle = 'rgba(0,0,0,.42)';
  ctx.beginPath(); ctx.ellipse(x + w / 2, y + h * 0.99, w * 0.54, h * 0.12, 0, 0, 7); ctx.fill();
  // wheels
  ctx.fillStyle = '#0a0b12';
  rrect(x + w * 0.04, y + h * 0.70, w * 0.18, h * 0.30, w * 0.05); ctx.fill();
  rrect(x + w * 0.78, y + h * 0.70, w * 0.18, h * 0.30, w * 0.05); ctx.fill();
  // lower body with vertical gradient
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, car.color); g.addColorStop(.55, car.color); g.addColorStop(1, dk);
  ctx.fillStyle = g; rrect(x + w * 0.04, y + h * 0.34, w * 0.92, h * 0.52, w * 0.10); ctx.fill();
  // cabin / roof (narrower)
  ctx.fillStyle = dk2; rrect(x + w * 0.16, y + h * 0.02, w * 0.68, h * 0.46, w * 0.12); ctx.fill();
  // rear window with a glassy reflection
  const wg = ctx.createLinearGradient(0, y + h * 0.08, 0, y + h * 0.40);
  wg.addColorStop(0, 'rgba(150,180,235,.38)'); wg.addColorStop(.5, '#0b0d18'); wg.addColorStop(1, '#0b0d18');
  ctx.fillStyle = wg; rrect(x + w * 0.21, y + h * 0.09, w * 0.58, h * 0.30, w * 0.08); ctx.fill();
  // body specular highlight
  ctx.fillStyle = 'rgba(255,255,255,.14)'; rrect(x + w * 0.10, y + h * 0.37, w * 0.80, h * 0.05, w * 0.03); ctx.fill();
  // side mirrors (bigger vehicles)
  if (big) {
    ctx.fillStyle = dk;
    rrect(x + w * 0.01, y + h * 0.30, w * 0.08, h * 0.09, w * 0.02); ctx.fill();
    rrect(x + w * 0.91, y + h * 0.30, w * 0.08, h * 0.09, w * 0.02); ctx.fill();
  }
  // bumper
  ctx.fillStyle = 'rgba(0,0,0,.34)'; rrect(x + w * 0.06, y + h * 0.78, w * 0.88, h * 0.16, w * 0.05); ctx.fill();
  // glowing tail lights
  if (big) { ctx.save(); ctx.shadowColor = '#ff2030'; ctx.shadowBlur = w * 0.4; }
  ctx.fillStyle = '#ff3346';
  rrect(x + w * 0.10, y + h * 0.52, w * 0.22, h * 0.15, w * 0.04); ctx.fill();
  rrect(x + w * 0.68, y + h * 0.52, w * 0.22, h * 0.15, w * 0.04); ctx.fill();
  if (big) ctx.restore();
  ctx.fillStyle = 'rgba(255,190,190,.85)';
  rrect(x + w * 0.13, y + h * 0.55, w * 0.07, h * 0.06, w * 0.02); ctx.fill();
  rrect(x + w * 0.80, y + h * 0.55, w * 0.07, h * 0.06, w * 0.02); ctx.fill();
  // high-mount brake light
  ctx.fillStyle = 'rgba(255,60,80,.9)'; rrect(x + w * 0.42, y + h * 0.30, w * 0.16, h * 0.045, w * 0.02); ctx.fill();
  // licence plate + twin exhausts
  ctx.fillStyle = '#dfe6f5'; rrect(x + w * 0.43, y + h * 0.70, w * 0.14, h * 0.10, w * 0.02); ctx.fill();
  if (big) {
    ctx.fillStyle = '#3a3f4d';
    rrect(x + w * 0.30, y + h * 0.92, w * 0.07, h * 0.05, w * 0.02); ctx.fill();
    rrect(x + w * 0.63, y + h * 0.92, w * 0.07, h * 0.05, w * 0.02); ctx.fill();
  }
}

// ===== 9. COCKPIT (dashboard + gauges + wheel) =====
function drawCockpit() {
  const dashTop = H * 0.74;
  const dashH = H - dashTop;

  // soft A-pillar shadows framing the windshield
  let lg = ctx.createLinearGradient(0, 0, W * 0.16, 0);
  lg.addColorStop(0, 'rgba(4,5,10,.85)'); lg.addColorStop(1, 'rgba(4,5,10,0)');
  ctx.fillStyle = lg; ctx.fillRect(0, 0, W * 0.16, dashTop + 4);
  let rg = ctx.createLinearGradient(W, 0, W - W * 0.16, 0);
  rg.addColorStop(0, 'rgba(4,5,10,.85)'); rg.addColorStop(1, 'rgba(4,5,10,0)');
  ctx.fillStyle = rg; ctx.fillRect(W - W * 0.16, 0, W * 0.16, dashTop + 4);

  // dashboard body with a curved cowl top
  const g = ctx.createLinearGradient(0, dashTop, 0, H);
  g.addColorStop(0, '#1b1e29'); g.addColorStop(.18, '#15171f'); g.addColorStop(1, '#070810');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, dashTop + 14);
  ctx.quadraticCurveTo(W / 2, dashTop - 18, W, dashTop + 14);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  // glossy top trim
  ctx.strokeStyle = 'rgba(120,160,230,.18)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, dashTop + 14); ctx.quadraticCurveTo(W / 2, dashTop - 18, W, dashTop + 14); ctx.stroke();

  // gauges flank the wheel
  const gaugeR = Math.min(dashH * 0.42, W * 0.12);
  const gy = dashTop + dashH * 0.46;
  const kmh = speed / (MAXSPEED / 200);   // dial tops out at 200 km/h
  const spd = speed / MAXSPEED;
  const gear = speed < 1 ? 'N' : Math.min(6, 1 + Math.floor(spd * 6));
  const rpm = speed < 1 ? 900 : 1000 + ((spd * 6) % 1) * 7200;
  drawGauge(W * 0.255, gy, gaugeR, Math.min(1, kmh / 200), 'SPEED', Math.round(kmh), 'km/h', 200, 1.1, '#34d3ff');
  drawGauge(W * 0.745, gy, gaugeR, Math.min(1, rpm / 8000), 'RPM', (rpm / 1000).toFixed(1), 'x1000', 8, 0.8, '#ff5db4');

  // gear badge in the centre, above the wheel
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,.06)'; rrect(W / 2 - 30, gy - gaugeR * 0.7, 60, 46, 10); ctx.fill();
  ctx.fillStyle = '#6b6e7e'; ctx.font = '600 11px system-ui, sans-serif'; ctx.fillText('GEAR', W / 2, gy - gaugeR * 0.7 + 14);
  ctx.fillStyle = '#f2f3f7'; ctx.font = '800 26px system-ui, sans-serif'; ctx.fillText(gear, W / 2, gy - gaugeR * 0.7 + 40);

  drawWheel(dashTop, dashH);
}

function drawGauge(cx, cy, R, frac, title, big, unit, maxLabel, redFrac, accent) {
  const A0 = -135 * Math.PI / 180, A1 = 135 * Math.PI / 180;  // measured clockwise from "up"
  const toCanvas = th => th - Math.PI / 2;                    // up(0) -> canvas -90deg
  // dial face
  ctx.save();
  ctx.fillStyle = '#0c0e16'; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.stroke();
  // redline zone
  if (redFrac < 1) {
    ctx.strokeStyle = 'rgba(255,60,80,.85)'; ctx.lineWidth = R * 0.10;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.86, toCanvas(A0 + (A1 - A0) * redFrac), toCanvas(A1)); ctx.stroke();
  }
  // value arc
  ctx.strokeStyle = accent; ctx.lineWidth = R * 0.10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.86, toCanvas(A0), toCanvas(A0 + (A1 - A0) * frac)); ctx.stroke();
  ctx.lineCap = 'butt';
  // ticks
  for (let i = 0; i <= 10; i++) {
    const th = A0 + (A1 - A0) * (i / 10), a = toCanvas(th);
    const major = i % 2 === 0, rr = R * (major ? 0.66 : 0.72);
    ctx.strokeStyle = i / 10 >= redFrac ? 'rgba(255,90,110,.9)' : 'rgba(255,255,255,.45)';
    ctx.lineWidth = major ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
    ctx.lineTo(cx + Math.cos(a) * R * 0.80, cy + Math.sin(a) * R * 0.80); ctx.stroke();
  }
  // needle
  const nth = toCanvas(A0 + (A1 - A0) * frac);
  ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#f4f6ff'; ctx.lineWidth = Math.max(2, R * 0.045); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - Math.cos(nth) * R * 0.16, cy - Math.sin(nth) * R * 0.16);
  ctx.lineTo(cx + Math.cos(nth) * R * 0.74, cy + Math.sin(nth) * R * 0.74); ctx.stroke(); ctx.restore();
  ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(cx, cy, R * 0.10, 0, 7); ctx.fill();
  ctx.fillStyle = '#0c0e16'; ctx.beginPath(); ctx.arc(cx, cy, R * 0.045, 0, 7); ctx.fill();
  // text
  ctx.textAlign = 'center'; ctx.fillStyle = '#6b6e7e'; ctx.font = '600 ' + Math.round(R * 0.16) + 'px system-ui, sans-serif';
  ctx.fillText(title, cx, cy - R * 0.34);
  ctx.fillStyle = '#f2f3f7'; ctx.font = '800 ' + Math.round(R * 0.42) + 'px system-ui, sans-serif';
  ctx.fillText(big, cx, cy + R * 0.5);
  ctx.fillStyle = '#6b6e7e'; ctx.font = '600 ' + Math.round(R * 0.14) + 'px system-ui, sans-serif';
  ctx.fillText(unit, cx, cy + R * 0.7);
  ctx.restore();
}

function drawWheel(dashTop, dashH) {
  const R = (H - dashTop) * 1.18;
  const cx = W / 2, cy = H + R * 0.12;
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(steerAngle);
  // outer rim
  ctx.lineWidth = R * 0.13; ctx.strokeStyle = '#15171f';
  ctx.beginPath(); ctx.arc(0, 0, R, 0, 7); ctx.stroke();
  // rim highlight (top)
  ctx.lineWidth = R * 0.05; ctx.strokeStyle = 'rgba(150,170,210,.25)';
  ctx.beginPath(); ctx.arc(0, 0, R, Math.PI * 1.12, Math.PI * 1.88); ctx.stroke();
  // grip accents
  ctx.lineWidth = R * 0.13; ctx.strokeStyle = 'rgba(52,211,255,.25)';
  ctx.beginPath(); ctx.arc(0, 0, R, Math.PI * 1.18, Math.PI * 1.34); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, R, Math.PI * 1.66, Math.PI * 1.82); ctx.stroke();
  // spokes (3-spoke: left, right, down)
  ctx.fillStyle = '#1b1e29';
  for (const ang of [Math.PI, 0, Math.PI / 2]) {
    ctx.save(); ctx.rotate(ang);
    ctx.beginPath(); ctx.moveTo(0, -R * 0.16); ctx.lineTo(R * 0.92, -R * 0.07);
    ctx.lineTo(R * 0.92, R * 0.07); ctx.lineTo(0, R * 0.16); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // centre hub
  ctx.fillStyle = '#222634'; ctx.beginPath(); ctx.arc(0, 0, R * 0.26, 0, 7); ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,.1)'; ctx.stroke();
  // hub emblem
  ctx.fillStyle = '#34d3ff'; ctx.font = '800 ' + Math.round(R * 0.16) + 'px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('CR', 0, R * 0.02);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ===== 10. HUD (level / time / banner) =====
function drawInfo() {
  // level (top-left)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#34d3ff'; ctx.font = '800 26px system-ui, sans-serif'; ctx.fillText('LV ' + level, 16, 38);
  ctx.fillStyle = '#6b6e7e'; ctx.font = '600 12px system-ui, sans-serif'; ctx.fillText('BEST 最佳 LV ' + bestLevel, 16, 58);
  // time left (top-right) — flashes red when low
  const tl = Math.max(0, timeLeft);
  ctx.textAlign = 'right';
  ctx.fillStyle = tl < 6 ? '#ff4d63' : '#f2f3f7'; ctx.font = '800 38px system-ui, sans-serif';
  ctx.fillText(tl.toFixed(1), W - 16, 42);
  ctx.fillStyle = '#6b6e7e'; ctx.font = '600 11px system-ui, sans-serif'; ctx.fillText('TIME 剩餘時間', W - 16, 60);
  // level-up banner
  if (perf < bannerUntil) {
    ctx.textAlign = 'center';
    ctx.save(); ctx.shadowColor = '#34d3ff'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#eaf6ff'; ctx.font = '800 40px system-ui, sans-serif';
    ctx.fillText(banner, W / 2, H * 0.30); ctx.restore();
    ctx.fillStyle = '#9a9db0'; ctx.font = '600 14px system-ui, sans-serif';
    ctx.fillText('go go go! 下一關，衝啊！', W / 2, H * 0.30 + 26);
  }
}

// ===== 11. LOOP + SIZING =====
function loop(t) {
  requestAnimationFrame(loop);
  if (!lastT) lastT = t;
  let dt = (t - lastT) / 1000; lastT = t; perf = t;
  if (!running || paused) { render(); return; }
  dt = Math.min(dt, 0.033);
  update(dt); render();
}

// ----- canvas sizing -----
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  view.width = W * dpr; view.height = H * dpr; view.style.width = W + 'px'; view.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

// ===== 12. CONTROLS =====
function startGame() {
  level = 1; timeLeft = timeLimit(1); banner = '';
  position = 0; speed = 0; playerX = 0; steerAngle = 0;
  resetCars(); $('#overlay').classList.add('hidden'); running = true; paused = false; started = 1;
}
function restart() { startGame(); }
function levelUp() {
  if (level > bestLevel) { bestLevel = level; try { localStorage.setItem('cityracer3d-level', bestLevel); } catch (e) {} }
  level++;
  timeLeft = timeLimit(level) + Math.min(6, timeLeft);   // carry a little leftover time as a bonus
  banner = 'LEVEL ' + level; bannerUntil = perf + 1900;
  resetCars(); position = 0;                              // same circuit, more & faster traffic
}
function gameOver() {
  running = false;
  const ov = $('#overlay');
  ov.querySelector('h1').textContent = 'Game Over';
  ov.querySelector('p').innerHTML = 'Time up! Reached <b>Level ' + level + '</b>　時間到！到達第 <b>' + level + '</b> 關<br>Best 最佳 <b>Level ' + bestLevel + '</b>';
  ov.querySelector('#ovBtn').textContent = '↻ Try again 再挑戰';
  ov.classList.remove('hidden');
}
function togglePause() {
  if (!started || !running) return; paused = !paused; const ov = $('#overlay');
  if (paused) {
    ov.querySelector('h1').textContent = 'Paused';
    ov.querySelector('p').innerHTML = 'Take a breather. 暫停中';
    ov.querySelector('#ovBtn').textContent = '▶ Resume 繼續';
    ov.classList.remove('hidden');
  } else ov.classList.add('hidden');
}
$('#ovBtn').addEventListener('click', () => { if (paused) togglePause(); else startGame(); });
$('#bRestart').addEventListener('click', restart);
$('#bPause').addEventListener('click', togglePause);

const keymap = { ArrowUp:'gas', w:'gas', W:'gas', ArrowDown:'brake', s:'brake', S:'brake',
  ArrowLeft:'left', a:'left', A:'left', ArrowRight:'right', d:'right', D:'right' };
addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') { togglePause(); e.preventDefault(); return; }
  if (e.key === 'r' || e.key === 'R') { restart(); e.preventDefault(); return; }
  if (e.key === 'Enter' && !started) { startGame(); return; }
  const k = keymap[e.key]; if (k) { input[k] = 1; e.preventDefault(); }
});
addEventListener('keyup', e => { const k = keymap[e.key]; if (k) { input[k] = 0; e.preventDefault(); } });

function hold(sel, key) {
  const el = $(sel);
  // capture the pointer so a held button keeps firing even if the finger drifts,
  // and so gas + steering on two fingers don't cancel each other (no pointerleave).
  const on = e => {
    e.preventDefault();
    input[key] = 1;
    try { el.setPointerCapture(e.pointerId); } catch (err) {}
  };
  const off = e => { e.preventDefault(); input[key] = 0; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
}
hold('#bGas', 'gas'); hold('#bBrake', 'brake'); hold('#bLeft', 'left'); hold('#bRight', 'right');

// ----- start! -----
buildTrack(); resetCars(); resize(); requestAnimationFrame(loop);
</script>
