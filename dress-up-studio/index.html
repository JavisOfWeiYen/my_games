<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✨ Dress-Up Studio 換裝小遊戲 ✨</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: "Comic Sans MS", "Chalkboard SE", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(160deg, #ffe9f3 0%, #e6f3ff 55%, #fff7d9 100%);
    min-height: 100vh;
    color: #5a4a6a;
  }
  header {
    text-align: center;
    padding: 14px 10px 4px;
  }
  header h1 { margin: 0; font-size: 28px; color: #e75a9c; text-shadow: 2px 2px 0 #fff; }
  header p { margin: 4px 0 0; font-size: 14px; color: #9b7fb8; }
  main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 18px;
    padding: 12px;
  }
  /* ---------- stage (the doll) ---------- */
  #stage {
    position: relative;
    background: #fff;
    border-radius: 24px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(180, 120, 200, .25);
    overflow: hidden;
  }
  #doll { display: block; width: 300px; height: 520px; border-radius: 16px; }
  #stageBtns { display: flex; gap: 8px; margin-top: 10px; }
  #stageBtns button {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 10px 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    transition: transform .1s;
  }
  #stageBtns button:active { transform: scale(.93); }
  #btnRandom { background: #ff8fb3; }
  #btnSave   { background: #6fc3f7; }
  #btnReset  { background: #b8a7d9; }
  .confetti {
    position: absolute; top: -30px;
    font-size: 24px; pointer-events: none;
    animation: fall 1.6s ease-in forwards;
  }
  @keyframes fall {
    to { transform: translateY(600px) rotate(380deg); opacity: 0; }
  }
  /* ---------- panel (the wardrobe) ---------- */
  #panel {
    background: #fff;
    border-radius: 24px;
    padding: 14px;
    width: min(440px, 96vw);
    box-shadow: 0 8px 24px rgba(180, 120, 200, .25);
  }
  #tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  #tabs button {
    border: 3px solid transparent;
    background: #f3eaff;
    border-radius: 14px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    color: #7a5fa0;
  }
  #tabs button.on { background: #ffd6e7; border-color: #ff8fb3; color: #d6427f; }
  #items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  #items button {
    border: 3px solid #eee4f8;
    background: #fdfaff;
    border-radius: 16px;
    padding: 8px 4px;
    font-family: inherit;
    cursor: pointer;
    transition: transform .1s;
  }
  #items button:active { transform: scale(.93); }
  #items button.on { border-color: #ffb347; background: #fff4dd; }
  #items .em { font-size: 30px; display: block; }
  #items .nm { font-size: 12px; color: #7a6a8a; display: block; margin-top: 2px; }
  #colorsWrap { margin-top: 12px; }
  #colorsWrap .lbl { font-size: 13px; color: #9b7fb8; margin-bottom: 6px; }
  #colors { display: flex; flex-wrap: wrap; gap: 8px; }
  #colors button {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(0,0,0,.12);
    cursor: pointer;
    transition: transform .1s;
  }
  #colors button.on { border-color: #5a4a6a; transform: scale(1.15); }
  footer { text-align: center; font-size: 12px; color: #b8a7c9; padding: 8px 0 16px; }
</style>
</head>

// darker shade of a hex color, for outlines and details
function dk(hex) {
  const n = parseInt(hex.slice(1), 16);
  const f = v => Math.round(v * 0.68);
  const r = f(n >> 16 & 255), g = f(n >> 8 & 255), b = f(n & 255);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ---------------- game state ----------------
let state = {};
// she starts dressed as the Ice Queen ❄️ — press Reset to come back to this look
function defaultState() {
  return {
    bg:    { sel: 5, color: '#ffffff' },          // Ice Castle
    hair:  { sel: 5, color: '#fcf6e8' },          // platinum Side Braid
    hat:   { sel: 0, color: '#ffd93d' },          // no hat
    top:   { sel: 5, color: '#8fd3f4' },          // Ice Queen top
    skirt: { sel: 5, color: '#8fd3f4' },          // Ice Gown
    shoes: { sel: 1, color: '#8fd3f4' },          // ballet flats
    acc:   { sel: [6, 7], color: '#8fd3f4' },     // Snow Cape + Ice Magic
  };
}

let activeCat = 'hair';

// ---------------- drawing ----------------
function paint(svg, color) {
  return svg.replace(/\{\{cd\}\}/g, dk(color)).replace(/\{\{c\}\}/g, color);
}

function renderDoll() {
  for (const c of CATS) {
    const st = state[c.id];
    const picked = c.multi ? st.sel.map(i => c.items[i]) : [c.items[st.sel]];
    let front = '', back = '';
    for (const it of picked) {
      if (!it) continue;
      front += it.svg || '';
      back += it.back || '';
    }
    document.getElementById(c.layer).innerHTML = paint(front, st.color);
    if (c.layerBack) document.getElementById(c.layerBack).innerHTML = paint(back, st.color);
  }
  saveGame();
}

// ---------------- wardrobe panel ----------------
function renderTabs() {
  $('#tabs').innerHTML = CATS.map(c =>
    `<button data-cat="${c.id}" class="${c.id === activeCat ? 'on' : ''}">${c.emoji} ${c.name} ${c.zh}</button>`
  ).join('');
}

function renderItems() {
  const c = CATS.find(x => x.id === activeCat);
  const st = state[c.id];
  $('#items').innerHTML = c.items.map((it, i) => {
    const on = c.multi ? st.sel.includes(i) : st.sel === i;
    return `<button data-i="${i}" class="${on ? 'on' : ''}">
      <span class="em">${it.emoji}</span><span class="nm">${it.name}<br>${it.zh}</span>
    </button>`;
  }).join('');

  if (c.colors) {
    $('#colorsWrap').style.display = '';
    $('#colors').innerHTML = c.colors.map(col =>
      `<button data-col="${col}" class="${col === st.color ? 'on' : ''}" style="background:${col}"></button>`
    ).join('');
  } else {
    $('#colorsWrap').style.display = 'none';
  }
}

// ---------------- fun extras ----------------
let actx;
function pop(freq) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.value = freq || 480 + Math.random() * 420;
    g.gain.setValueAtTime(.12, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + .18);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + .2);
  } catch (e) { /* sound is optional */ }
}

function confetti() {
  const emojis = ['🎀','⭐','💖','✨','🌸','🦋','🍬'];
  for (let k = 0; k < 14; k++) {
    const sp = document.createElement('span');
    sp.className = 'confetti';
    sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    sp.style.left = (5 + Math.random() * 90) + '%';
    sp.style.animationDelay = (Math.random() * .4) + 's';
    $('#stage').appendChild(sp);
    setTimeout(() => sp.remove(), 2200);
  }
}

function randomOutfit() {
  for (const c of CATS) {
    const st = state[c.id];
    if (c.multi) {
      // wear 1 or 2 random extras
      const n = 1 + Math.floor(Math.random() * 2);
      const pool = c.items.map((_, i) => i).sort(() => Math.random() - .5);
      st.sel = pool.slice(0, n);
    } else {
      st.sel = Math.floor(Math.random() * c.items.length);
    }
    if (c.colors) st.color = c.colors[Math.floor(Math.random() * c.colors.length)];
  }
  renderDoll(); renderItems();
  confetti(); pop(700);
}

function savePicture() {
  const svg = $('#doll');
  const data = new XMLSerializer().serializeToString(svg);
  const url = URL.createObjectURL(new Blob([data], { type: 'image/svg+xml;charset=utf-8' }));
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = 600; cv.height = 1040;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.drawImage(img, 0, 0, cv.width, cv.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'my-dress-up.png';
    a.href = cv.toDataURL('image/png');
    a.click();
  };
  img.src = url;
  pop(900);
}

// ---------------- remember the outfit ----------------
function saveGame() {
  try { localStorage.setItem('dressup-save', JSON.stringify(state)); } catch (e) {}
}
function loadGame() {
  try {
    const raw = localStorage.getItem('dressup-save');
    if (!raw) return;
    const saved = JSON.parse(raw);
    for (const c of CATS) {
      if (!saved[c.id]) continue;
      const st = saved[c.id];
      const ok = c.multi
        ? Array.isArray(st.sel) && st.sel.every(i => c.items[i])
        : Number.isInteger(st.sel) && c.items[st.sel];
      if (ok) state[c.id] = { sel: st.sel, color: st.color || c.def };
    }
  } catch (e) {}
}

// ---------------- clicks ----------------
$('#tabs').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  activeCat = b.dataset.cat;
  renderTabs(); renderItems(); pop(520);
});

$('#items').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  const c = CATS.find(x => x.id === activeCat);
  const i = +b.dataset.i;
  const st = state[c.id];
  if (c.multi) {
    st.sel = st.sel.includes(i) ? st.sel.filter(x => x !== i) : [...st.sel, i];
  } else {
    st.sel = i;
  }
  renderDoll(); renderItems(); pop();
});

$('#colors').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state[activeCat].color = b.dataset.col;
  renderDoll(); renderItems(); pop();
});

$('#btnRandom').addEventListener('click', randomOutfit);
$('#btnSave').addEventListener('click', savePicture);
$('#btnReset').addEventListener('click', () => {
  state = defaultState();
  try { localStorage.removeItem('dressup-save'); } catch (e) {}
  renderDoll(); renderItems(); pop(300);
});

// ---------------- start! ----------------
state = defaultState();
loadGame();
renderTabs();
renderItems();
renderDoll();
</script>
